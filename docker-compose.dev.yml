version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    environment:
      - APP_ENV=prod
      - APP_SECRET_KEY=change_this_to_a_secure_key
      - APP_ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - DATABASE_ENGINE=postgresql
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=ollama_hack
      - DATABASE_PASSWORD=change_this_password
      - DATABASE_DB=ollama_hack
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - 8000
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=ollama_hack
      - POSTGRES_USER=ollama_hack
      - POSTGRES_PASSWORD=change_this_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollama_hack"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge