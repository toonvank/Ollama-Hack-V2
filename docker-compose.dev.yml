version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP__ENV=prod
      - APP__LOG_LEVEL=INFO
      - APP__SECRET_KEY=change_this_to_a_secure_key
      - APP__ALGORITHM=HS256
      - APP__ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - DATABASE__ENGINE=postgresql
      - DATABASE__HOST=db
      - DATABASE__PORT=5432
      - DATABASE__USERNAME=ollama_hack
      - DATABASE__PASSWORD=change_this_password
      - DATABASE__DB=ollama_hack
    depends_on:
      - db
    restart: unless-stopped
    expose:
      - 8000
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=ollama_hack
      - POSTGRES_USER=ollama_hack
      - POSTGRES_PASSWORD=change_this_password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    expose:
      - 5432
    networks:
      - app-network

networks:
  app-network:
    driver: bridge